function useInView(ref) {
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting) setVis(true); }, {threshold:0.1});
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return vis;
}

function FadeUp({children, delay=0, style={}, className=""}) {
  const ref = useRef(null);
  const vis = useInView(ref);
  return h('div', {ref, className:"fade-up"+(vis?" vis":""), style:{animationDelay:delay+"ms",...style}}, children);
}

function Contador({target, suf=""}) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const vis = useInView(ref);
  useEffect(() => {
    if(!vis) return;
    let n=0; const step=target/40;
    const t = setInterval(() => { n+=step; if(n>=target){setVal(target);clearInterval(t);}else setVal(Math.floor(n)); }, 35);
    return () => clearInterval(t);
  }, [vis, target]);
  return h('span', {ref}, val+suf);
}
